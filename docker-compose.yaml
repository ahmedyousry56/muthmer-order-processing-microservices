version: '3.9'

services:
  kafka:
    image: apache/kafka:latest
    hostname: kafka
    container_name: kafka
    ports:
      - '${KAFKA_EXTERNAL_PORT:-9092}:9092'
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_NODE_ID: 1
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_LISTENERS: PLAINTEXT://kafka:29092,CONTROLLER://kafka:29093,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      KAFKAJS_NO_PARTITIONER_WARNING: 1
    healthcheck:
      test:
        [
          'CMD-SHELL',
          '/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list',
        ]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - app-net

  kafka-init:
    image: apache/kafka:latest
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ['/bin/sh', '-c']
    command:
      - |
        echo "Creating Kafka topics..."
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:29092 --create --if-not-exists --topic order.created   --partitions 1 --replication-factor 1
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:29092 --create --if-not-exists --topic order.confirmed --partitions 1 --replication-factor 1
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:29092 --create --if-not-exists --topic order.failed    --partitions 1 --replication-factor 1
        echo "Topics ready:"
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:29092 --list
    networks:
      - app-net

  postgres:
    image: postgres:latest
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASS:-postgres}
      POSTGRES_DB: ${DB_NAME:-muthmerDB}
    ports:
      - '${DB_PORT:-5432}:5432'
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-postgres}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-net

  db-migrate:
    build:
      context: .
      dockerfile: apps/db-migrate/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASS:-postgres}@postgres:${DB_PORT:-5432}/${DB_NAME:-muthmerDB}?schema=public
    networks:
      - app-net
    restart: 'no'

  orders-service:
    build:
      context: .
      dockerfile: apps/orders-service/Dockerfile
      args:
        PORT: ${PORT:-3000}
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      db-migrate:
        condition: service_completed_successfully
    ports:
      - '${PORT:-3000}:${PORT:-3000}'
    environment:
      PORT: ${PORT:-3000}
      KAFKA_BROKER: kafka:29092
      KAFKA_ORDERS_GROUP: ${KAFKA_ORDERS_GROUP:-orders-consumer-group}
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASS:-postgres}@postgres:${DB_PORT:-5432}/${DB_NAME:-muthmerDB}?schema=public
      NODE_ENV: ${NODE_ENV:-development}
      KAFKAJS_NO_PARTITIONER_WARNING: 1
    networks:
      - app-net

  inventory-service:
    build:
      context: .
      dockerfile: apps/inventory-service/Dockerfile
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      db-migrate:
        condition: service_completed_successfully
    environment:
      KAFKA_BROKER: kafka:29092
      KAFKA_INVENTORY_GROUP: ${KAFKA_INVENTORY_GROUP:-inventory-consumer-group}
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASS:-postgres}@postgres:${DB_PORT:-5432}/${DB_NAME:-muthmerDB}?schema=public
      NODE_ENV: ${NODE_ENV:-development}
      KAFKAJS_NO_PARTITIONER_WARNING: 1
    networks:
      - app-net

volumes:
  pgdata:

networks:
  app-net:
    driver: bridge
